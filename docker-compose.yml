services:
  api-1: &api
    image: ${API_IMAGE:-swat-api:latest}
    environment:
      API_ADDR: :8080
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-102400}
      OCR_API_URL: ${OCR_API_URL:-}
      OCR_MAP: ${OCR_MAP:-true}
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-0}
      OCR_ASYNC_WORKERS: ${OCR_ASYNC_WORKERS:-16}
      OCR_ASYNC_QUEUE: ${OCR_ASYNC_QUEUE:-1024}
      API_WRITE_TIMEOUT_MS: ${API_WRITE_TIMEOUT_MS:-0}
    expose:
      - "8080"
    restart: unless-stopped

  api-2:
    <<: *api

  api-3:
    <<: *api

  api-4:
    <<: *api

  api-5:
    <<: *api

  haproxy:
    image: haproxy:3.0-alpine
    depends_on:
      - api-1
      - api-2
      - api-3
      - api-4
      - api-5
    expose:
      - "8080"
      - "8404"
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-swat-frontend:latest}
    depends_on:
      - haproxy
    ports:
      - "${FRONTEND_PORT:-19090}:80"
    restart: unless-stopped
