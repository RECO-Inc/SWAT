services:
  api-1: &api
    image: ${API_IMAGE:-swat-api:latest}
    environment:
      API_ADDR: :8080
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-102400}
      OCR_API_URL: ${OCR_API_URL:-}
      OCR_MAP: ${OCR_MAP:-true}
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-0}
      OCR_ASYNC_WORKERS: ${OCR_ASYNC_WORKERS:-16}
      OCR_ASYNC_QUEUE: ${OCR_ASYNC_QUEUE:-1024}
      API_WRITE_TIMEOUT_MS: ${API_WRITE_TIMEOUT_MS:-0}
    expose:
      - "8080"
    restart: unless-stopped

  api-2:
    <<: *api

  api-3:
    <<: *api

  api-4:
    <<: *api

  api-5:
    <<: *api

  haproxy:
    image: haproxy:3.0-alpine
    depends_on:
      - api-1
      - api-2
      - api-3
      - api-4
      - api-5
    expose:
      - "8080"
    ports:
      - "${HAPROXY_STATS_PORT:-8404}:8404"
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-swat-frontend:latest}
    depends_on:
      - haproxy
    ports:
      - "${FRONTEND_PORT:-19090}:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-swat}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
