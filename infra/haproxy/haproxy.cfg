global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    option http-keep-alive
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    timeout http-keep-alive 10s

frontend swat_api
    bind :8080
    default_backend swat_api_backends

backend swat_api_backends
    balance leastconn
    option httpchk GET /health
    http-check expect status 200
    http-response set-header X-Backend-Server %[srv_name]
    server api-1 api-1:8080 check maxconn 1024
    server api-2 api-2:8080 check maxconn 1024
    server api-3 api-3:8080 check maxconn 1024
    server api-4 api-4:8080 check maxconn 1024
    server api-5 api-5:8080 check maxconn 1024

frontend haproxy_stats
    bind :8404
    stats enable
    stats uri /
    stats refresh 5s
