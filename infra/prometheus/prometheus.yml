global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: swat-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-1:8080
          - api-2:8080
          - api-3:8080
          - api-4:8080
          - api-5:8080
        labels:
          layer: api

  - job_name: haproxy
    metrics_path: /metrics
    static_configs:
      - targets:
          - haproxy:8404
        labels:
          layer: haproxy
